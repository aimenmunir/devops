apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-exam-deployment
  labels:
    app: devops-exam-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-exam-app
  template:
    metadata:
      labels:
        app: devops-exam-app
    spec:
      containers:
      - name: devops-exam-container
        # Make sure to replace <your-dockerhub-username> with your actual Docker Hub username!
        image: <your-dockerhub-username>/fa23-bcs-027:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
