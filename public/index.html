<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps App - fa23-bcs-027</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            color: #1a202c;
            font-size: 28px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #4299e1;
        }
        button {
            background-color: #4299e1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3182ce;
        }
        .success-msg {
            color: #48bb78;
            font-size: 14px;
            margin-bottom: 20px;
            height: 20px;
            visibility: hidden;
        }
        h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 15px;
        }
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-item {
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .msg-text {
            color: #4a5568;
            font-size: 15px;
        }
        .msg-time {
            color: #a0aec0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app-card">
        <h1>fa23-bcs-027 DevOps App</h1>
        
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button onclick="addMessage()">Add</button>
        </div>
        <div id="successMsg" class="success-msg">Message added!</div>

        <h2>Messages</h2>
        <div id="messageList" class="message-list">
            <!-- Messages will appear here -->
        </div>
    </div>

    <script>
        const messageList = document.getElementById('messageList');
        const messageInput = document.getElementById('messageInput');
        const successMsg = document.getElementById('successMsg');

        async function fetchMessages() {
            try {
                const res = await fetch('/api/messages');
                const messages = await res.json();
                messageList.innerHTML = messages.map(m => `
                    <div class="message-item">
                        <span class="msg-text">${m.text}</span>
                        <span class="msg-time">${m.time}</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error fetching messages:", err);
            }
        }

        async function addMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                if (res.ok) {
                    messageInput.value = '';
                    successMsg.style.visibility = 'visible';
                    setTimeout(() => successMsg.style.visibility = 'hidden', 3000);
                    fetchMessages();
                }
            } catch (err) {
                console.error("Error adding message:", err);
            }
        }

        // Initial fetch
        fetchMessages();
    </script>
</body>
</html>
